name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  windows-release:
    runs-on: windows-latest
    permissions:
      contents: write
      actions: read

    env:
      SIGNPATH_ORGANIZATION_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
      SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
      SIGNPATH_SIGNING_POLICY_SLUG: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
      SIGNPATH_ARTIFACT_CONFIGURATION_SLUG_PORTABLE: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG_PORTABLE }}
      SIGNPATH_ARTIFACT_CONFIGURATION_SLUG_SETUP: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG_SETUP }}
      SIGNPATH_ARTIFACT_CONFIGURATION_SLUG_MSI: ${{ vars.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG_MSI }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22.21.1
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1

      - name: Detect SignPath configuration
        id: signpath
        shell: bash
        run: |
          missing=()
          [[ -n "${{ secrets.SIGNPATH_API_TOKEN }}" ]] || missing+=("SIGNPATH_API_TOKEN secret")
          [[ -n "$SIGNPATH_ORGANIZATION_ID" ]] || missing+=("SIGNPATH_ORGANIZATION_ID variable")
          [[ -n "$SIGNPATH_PROJECT_SLUG" ]] || missing+=("SIGNPATH_PROJECT_SLUG variable")
          [[ -n "$SIGNPATH_SIGNING_POLICY_SLUG" ]] || missing+=("SIGNPATH_SIGNING_POLICY_SLUG variable")
          [[ -n "$SIGNPATH_ARTIFACT_CONFIGURATION_SLUG_PORTABLE" ]] || missing+=("SIGNPATH_ARTIFACT_CONFIGURATION_SLUG_PORTABLE variable")
          [[ -n "$SIGNPATH_ARTIFACT_CONFIGURATION_SLUG_SETUP" ]] || missing+=("SIGNPATH_ARTIFACT_CONFIGURATION_SLUG_SETUP variable")
          [[ -n "$SIGNPATH_ARTIFACT_CONFIGURATION_SLUG_MSI" ]] || missing+=("SIGNPATH_ARTIFACT_CONFIGURATION_SLUG_MSI variable")
          if (( ${#missing[@]} > 0 )); then
            {
              echo 'signpath_enabled=false'
              echo 'missing_signpath_configuration<<EOF'
              printf '%s\n' "${missing[@]}"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
            printf 'SignPath not configured. Proceeding with unsigned release assets.\n'
            printf '  - %s\n' "${missing[@]}"
          else
            echo 'signpath_enabled=true' >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows bundle
        run: pnpm --filter @glaremute/desktop tauri:build

      - name: Prepare portable artifact
        shell: bash
        run: cp target/release/glare-mute-desktop.exe target/release/glare-mute-portable.exe

      - name: Upload unsigned portable artifact
        id: upload-portable
        uses: actions/upload-artifact@v4
        with:
          name: glare-mute-portable-unsigned-${{ github.sha }}
          if-no-files-found: error
          path: target/release/glare-mute-portable.exe

      - name: Upload unsigned setup artifact
        id: upload-setup
        uses: actions/upload-artifact@v4
        with:
          name: glare-mute-setup-unsigned-${{ github.sha }}
          if-no-files-found: error
          path: target/release/bundle/nsis/*.exe

      - name: Upload unsigned MSI artifact
        id: upload-msi
        uses: actions/upload-artifact@v4
        with:
          name: glare-mute-msi-unsigned-${{ github.sha }}
          if-no-files-found: error
          path: target/release/bundle/msi/*.msi

      - name: Sign portable artifact
        id: sign-portable
        if: steps.signpath.outputs.signpath_enabled == 'true'
        uses: SignPath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ env.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ env.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG_PORTABLE }}
          github-artifact-id: ${{ steps.upload-portable.outputs.artifact-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          wait-for-completion: true
          output-artifact-directory: signed/portable

      - name: Sign setup artifact
        id: sign-setup
        if: steps.signpath.outputs.signpath_enabled == 'true'
        uses: SignPath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ env.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ env.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG_SETUP }}
          github-artifact-id: ${{ steps.upload-setup.outputs.artifact-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          wait-for-completion: true
          output-artifact-directory: signed/setup

      - name: Sign MSI artifact
        id: sign-msi
        if: steps.signpath.outputs.signpath_enabled == 'true'
        uses: SignPath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ env.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ env.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG_MSI }}
          github-artifact-id: ${{ steps.upload-msi.outputs.artifact-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          wait-for-completion: true
          output-artifact-directory: signed/msi

      - name: Upload signed Windows bundle artifacts
        if: steps.signpath.outputs.signpath_enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: glare-mute-windows-signed-${{ github.sha }}
          if-no-files-found: error
          path: |
            signed/portable/*
            signed/setup/*
            signed/msi/*

      - name: Publish draft GitHub Release (signed)
        if: startsWith(github.ref, 'refs/tags/v') && steps.signpath.outputs.signpath_enabled == 'true'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          body_path: .github/release-body-signpath.md
          files: |
            signed/portable/*
            signed/setup/*
            signed/msi/*

      - name: Publish draft GitHub Release (unsigned)
        if: startsWith(github.ref, 'refs/tags/v') && steps.signpath.outputs.signpath_enabled != 'true'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          body_path: .github/release-body-unsigned.md
          files: |
            target/release/glare-mute-portable.exe
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
