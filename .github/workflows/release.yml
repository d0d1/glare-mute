name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  windows-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22.21.1
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows bundle
        run: pnpm --filter @glaremute/desktop tauri:build

      - name: Prepare portable artifact
        shell: bash
        run: cp target/release/glare-mute-desktop.exe target/release/glare-mute-portable.exe

      - name: Upload Windows bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: glare-mute-windows-bundle-${{ github.sha }}
          path: |
            target/release/glare-mute-portable.exe
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe

      - name: Publish draft GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            target/release/glare-mute-portable.exe
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
