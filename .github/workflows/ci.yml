name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  web-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.21.1

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend and docs
        run: pnpm lint:js

      - name: Build browser preview
        run: pnpm build:web

      - name: Run unit tests
        run: pnpm test:unit

      - name: Install Playwright browser
        run: pnpm playwright:install

      - name: Run Playwright review
        run: pnpm test:e2e

  rust-quality:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          components: rustfmt, clippy

      - name: Format check
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test shared crates
        run: cargo test -p glare-mute-core -p glare-mute-platform

      - name: Check desktop shell
        run: cargo check -p glare-mute-desktop

  windows-release-validation:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22.21.1
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows release bundle
        run: pnpm --filter @glaremute/desktop tauri:build

      - name: Prepare portable artifact
        shell: bash
        run: cp target/release/glare-mute-desktop.exe target/release/glare-mute-portable.exe

      - name: Verify release artifact layout
        shell: pwsh
        run: |
          $portable = "target/release/glare-mute-portable.exe"
          $setup = Get-ChildItem "target/release/bundle/nsis/*.exe"
          $msi = Get-ChildItem "target/release/bundle/msi/*.msi"

          if (-not (Test-Path $portable)) {
            throw "Missing portable artifact: $portable"
          }

          if ($setup.Count -ne 1) {
            throw "Expected exactly one NSIS setup artifact, found $($setup.Count)"
          }

          if ($msi.Count -ne 1) {
            throw "Expected exactly one MSI artifact, found $($msi.Count)"
          }

          if ($setup[0].Name -notmatch '^Glare mute_.+_x64-setup\.exe$') {
            throw "Unexpected setup artifact name: $($setup[0].Name)"
          }

          if ($msi[0].Name -notmatch '^Glare mute_.+_x64_en-US\.msi$') {
            throw "Unexpected MSI artifact name: $($msi[0].Name)"
          }
